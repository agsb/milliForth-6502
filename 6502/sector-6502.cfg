
# the device area space is defined by hardware
# sure not need 32k ROM
SYMBOLS {
    #__ROM__: value = $F000, type = weak;
    # RAH for GrantSearle 6502 with 32K RAM, reduce for less
    __ROM__: value = $8000, type = weak;
}

MEMORY {
# ZERO
#   RAH in a 6502 page 0 and 1 are reserved for pointers and hardware (stack)
    ZERO: type = rw, start = $0000, size = $0200; 
# RAM 
    #RAM:  type = rw, start = $0200, size = __ROM__ - $0200;
    # RAH for GrantSearle 6502. addresses in $0200 are used by the monitor
    # so 0300 is the first page available for FORTH.
    RAM:  type = rw, start = $0400, size = __ROM__ - $0400;

# RAM 
#   RAM:  type = rw, start = $0200, size = __ROM__ - $0200, fill=yes, fillval=$00, file = "ram.bin";

# ROM 
#    ROM: type = ro, start = __ROM__, size = $1000, fill=yes, fillval=$00, file = "rom.bin";
}

SEGMENTS {
    ZERO:     load = ZERO, type = zp, start = $0000;
    #CODE:     load = RAM,  type = rw, start = $0200;
    # RAH for GrantSearle 6502
    CODE:     load = RAM,  type = rw, start = $0400;
#    ONCE:     load = ROM, type = ro;
#    VECTORS:  load = ROM, type = ro, start = $FFFA;
}


